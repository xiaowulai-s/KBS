<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KBS — 知识库</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <script src="https://cdn.jsdelivr.net/npm/minisearch@7.1.0/dist/umd/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@15.0.6/lib/marked.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.475.0/dist/umd/lucide.min.js"></script>
    <link
      rel="alternate"
      type="application/rss+xml"
      title="KBS"
      href="feed.xml"
    />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="KBS" />
    <link rel="apple-touch-icon" href="assets/images/icon-192.svg" />
  </head>
  <body>
    <div class="app">
      <!-- Status Bar -->
      <header class="status-bar" role="banner">
        <div class="status-left">
          <span class="status-brand">KBS</span>
          <span class="status-sep"></span>
          <span class="status-text" id="statusText">共 0 条</span>
        </div>
        <div class="status-right">
          <button class="status-btn" id="adminToggleBtn" aria-label="管理面板">
            <i data-lucide="settings"></i>
          </button>
          <button class="status-btn" id="themeToggle" aria-label="切换主题">
            <i data-lucide="moon" id="themeIcon"></i>
          </button>
        </div>
      </header>

      <!-- Entry List -->
      <main class="entry-list" id="entryList" role="list" aria-label="条目列表">

      <!-- Bottom Bar -->
      <footer class="bottom-bar" id="bottomBar">
        <div class="bottom-main">
          <div class="bottom-filters" id="filterChips"></div>
          <div class="bottom-actions">
            <button class="bottom-btn" id="filterToggleBtn">
              <i data-lucide="filter"></i>
              <span id="filterLabel">全部</span>
            </button>
            <button class="bottom-btn" id="sortBtn">
              <i data-lucide="arrow-up-down"></i>
              <span id="sortLabel">最新</span>
            </button>
            <button class="bottom-btn" id="densityBtn" title="切换密度 ⌘1-3">
              <i data-lucide="list"></i>
            </button>
            <button class="bottom-btn bottom-btn-primary" id="addBtn">
              <i data-lucide="plus"></i>
            </button>
          </div>
        </div>
        <div class="bottom-panel" id="filterPanel" style="display: none">
          <div class="filter-group">
            <div class="filter-group-label">分类</div>
            <div class="filter-options" id="filterCategories"></div>
          </div>
          <div class="filter-group">
            <div class="filter-group-label">标签</div>
            <div class="filter-tags" id="filterTags"></div>
          </div>
        </div>
        <div class="bottom-stats" id="bottomStats" style="display: none"></div>
      </footer>

      <!-- Command Palette -->
      <div
        id="commandPalette"
        class="command-palette"
        style="display: none"
        role="dialog"
        aria-label="命令面板"
      >
        <div class="cmd-overlay" id="cmdOverlay"></div>
        <div class="cmd-panel">
          <div class="cmd-input-wrap">
            <span class="cmd-prefix" id="cmdPrefix"></span>
            <input
              type="text"
              id="cmdInput"
              placeholder="搜索知识库..."
              autocomplete="off"
              spellcheck="false"
            />
            <span class="cmd-hint" id="cmdHint"></span>
          </div>
          <div class="cmd-results" id="cmdResults"></div>
          <div class="cmd-footer">
            <span>↑↓ 导航</span><span>Enter 选择</span><span>Esc 关闭</span>
            <span class="cmd-hint-text" id="cmdModeHint"
              >输入 &gt; 执行命令 · @ 按标签 · # 按分类</span
            >
          </div>
        </div>
      </div>

      <!-- Floating Toolbox -->
      <div id="toolbox" class="toolbox" style="display: none" role="menu"></div>

      <!-- Fullscreen Reader -->
      <div
        id="reader"
        class="reader"
        style="display: none"
        role="dialog"
        aria-modal="true"
      >
        <div class="reader-header">
          <button class="reader-back" id="readerBack">
            <i data-lucide="arrow-left"></i>
            <span>返回</span>
          </button>
          <div class="reader-title" id="readerTitle"></div>
          <div class="reader-actions">
            <button
              class="reader-action-btn"
              id="readerFavBtn"
              aria-label="收藏"
            >
              <i data-lucide="star"></i>
            </button>
            <button
              class="reader-action-btn"
              id="readerEditBtn"
              aria-label="编辑"
            >
              <i data-lucide="pencil"></i>
            </button>
            <button
              class="reader-action-btn"
              id="readerDeleteBtn"
              aria-label="删除"
            >
              <i data-lucide="trash-2"></i>
            </button>
            <button
              class="reader-action-btn"
              id="readerClose"
              aria-label="关闭"
            >
              <i data-lucide="x"></i>
            </button>
          </div>
        </div>
        <div class="reader-body" id="readerBody">
          <div class="reader-meta">
            <span class="reader-category" id="readerCategory"></span>
            <span class="reader-sep">·</span>
            <span class="reader-tags" id="readerTags"></span>
            <span class="reader-sep">·</span>
            <span class="reader-date" id="readerDate"></span>
          </div>
          <h1 class="reader-heading" id="readerHeading"></h1>
          <div class="reader-content" id="readerContent"></div>
        </div>
      </div>
    </div>

    <!-- Form Modal -->
    <div
      id="formModal"
      class="modal"
      style="display: none"
      role="dialog"
      aria-modal="true"
    >
      <div class="modal-overlay" id="formOverlay"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="formTitleText">添加文件</h2>
          <button class="modal-close" id="formClose">
            <i data-lucide="x"></i>
          </button>
        </div>
        <form id="entryForm">
          <input type="hidden" id="editId" />
          <div class="form-group">
            <label for="formTitle">标题 *</label>
            <input
              type="text"
              id="formTitle"
              required
              placeholder="请输入文件标题"
            />
          </div>
          <div class="form-group">
            <label for="formCategory">分类 *</label>
            <select id="formCategory" required>
              <option value="">请选择分类</option>
            </select>
            <input
              type="text"
              id="formCategoryNew"
              class="new-category-input"
              placeholder="或输入新分类名称"
            />
          </div>
          <div class="form-group">
            <label for="formTags">标签（用逗号分隔）</label>
            <input
              type="text"
              id="formTags"
              placeholder="例如：JavaScript, 教程"
            />
          </div>
          <div class="form-group">
            <label for="formPath">文件路径</label>
            <input
              type="text"
              id="formPath"
              placeholder="例如：docs/example.md"
            />
          </div>
          <div class="form-group">
            <label for="formDesc">描述</label>
            <textarea
              id="formDesc"
              rows="3"
              placeholder="简要描述此文件内容"
            ></textarea>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary">保存</button>
            <button type="button" class="btn btn-secondary" id="formCancel">
              取消
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Admin Panel -->
    <div
      id="adminPanel"
      class="admin-panel"
      style="display: none"
      role="dialog"
      aria-label="管理面板"
    >
      <div class="container">
        <div class="admin-header">
          <h2>管理面板</h2>
          <div class="admin-actions">
            <button class="btn btn-primary" id="deployBtn">
              <i data-lucide="rocket"></i> 部署到 GitHub
            </button>
            <button class="btn btn-secondary" id="exportBtn">
              <i data-lucide="download"></i> 导出 JSON
            </button>
            <button class="btn btn-secondary" id="importBtn">
              <i data-lucide="upload"></i> 导入 JSON
            </button>
            <button class="btn btn-ghost" id="checkUpdateBtn">
              <i data-lucide="refresh-cw"></i> 检查更新
            </button>
            <button class="btn btn-secondary" id="resetFromServerBtn">
              <i data-lucide="rotate-ccw"></i> 重置为服务端
            </button>
            <button class="btn btn-danger" id="closeAdmin">
              <i data-lucide="x"></i> 关闭
            </button>
          </div>
        </div>
        <div id="statsContainer" class="stats-container"></div>
        <div class="admin-table-wrapper">
          <table class="admin-table" id="adminTable">
            <thead>
              <tr>
                <th>ID</th>
                <th>标题</th>
                <th>分类</th>
                <th>标签</th>
                <th>路径</th>
                <th>日期</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="adminTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <input
      type="file"
      id="importFileInput"
      accept=".json"
      style="display: none"
    />
    <datalist id="pathSuggestions"></datalist>

    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/admin.js"></script>
  </body>
</html>
