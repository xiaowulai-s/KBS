<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>页面未找到 - 本地文件知识库</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .not-found {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 60vh; text-align: center; padding: 40px 20px;
    }
    .not-found-icon { font-size: 72px; margin-bottom: 20px; }
    .not-found h1 { font-size: 48px; color: var(--primary); margin-bottom: 12px; }
    .not-found p { color: var(--text-secondary); font-size: 18px; margin-bottom: 24px; }
    .not-found a { color: var(--primary); text-decoration: none; font-weight: 500; }
    .not-found a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="not-found">
    <div class="not-found-icon">&#128269;</div>
    <h1>404</h1>
    <p>页面未找到，也许它已被删除或从未存在。</p>
    <p><a href="index.html">&#8592; 返回首页</a></p>
  </div>
</body>
</html>
